<!--
  SQUADNESS DS — Progress
  ───────────────────────────────────────────────────────────────
  Clases clave: .progress  .progress-bar
  Los estilos (height, bg, radius, color) vienen de tokens.css via --bs-progress-*.
-->

<!-- ── Básico ───────────────────────────────────────────────── -->
<div class="progress" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar" style="width:60%;"></div>
</div>

<!-- ── Con etiqueta de porcentaje ───────────────────────────── -->
<div class="d-flex flex-column gap-1">
  <div class="d-flex justify-content-between">
    <span style="font-size:13px;font-weight:500;">Completado</span>
    <span style="font-size:13px;color:var(--sq-text-subtlest);">75%</span>
  </div>
  <div class="progress">
    <div class="progress-bar" style="width:75%;"></div>
  </div>
</div>

<!-- ── Variantes de color ────────────────────────────────────── -->
<div class="d-flex flex-column gap-3">
  <div class="d-flex flex-column gap-1">
    <div class="d-flex justify-content-between">
      <span style="font-size:12px;color:var(--sq-text-subtlest);">Brand (default)</span>
      <span style="font-size:12px;color:var(--sq-text-subtlest);">80%</span>
    </div>
    <div class="progress"><div class="progress-bar" style="width:80%;"></div></div>
  </div>

  <div class="d-flex flex-column gap-1">
    <div class="d-flex justify-content-between">
      <span style="font-size:12px;color:var(--sq-text-success);">Éxito</span>
      <span style="font-size:12px;color:var(--sq-text-subtlest);">100%</span>
    </div>
    <div class="progress"><div class="progress-bar bg-success" style="width:100%;"></div></div>
  </div>

  <div class="d-flex flex-column gap-1">
    <div class="d-flex justify-content-between">
      <span style="font-size:12px;color:var(--sq-text-warning);">En progreso</span>
      <span style="font-size:12px;color:var(--sq-text-subtlest);">45%</span>
    </div>
    <div class="progress"><div class="progress-bar bg-warning" style="width:45%;"></div></div>
  </div>

  <div class="d-flex flex-column gap-1">
    <div class="d-flex justify-content-between">
      <span style="font-size:12px;color:var(--sq-text-error);">Crítico</span>
      <span style="font-size:12px;color:var(--sq-text-subtlest);">15%</span>
    </div>
    <div class="progress"><div class="progress-bar bg-danger" style="width:15%;"></div></div>
  </div>
</div>

<!-- ── Animado (carga indeterminada) ────────────────────────── -->
<div class="progress">
  <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%;"></div>
</div>

<!-- ── Múltiple en stack ─────────────────────────────────────── -->
<div class="progress" style="height:8px;">
  <div class="progress-bar" style="width:35%;" title="Completado"></div>
  <div class="progress-bar bg-warning" style="width:20%;" title="En progreso"></div>
  <div class="progress-bar bg-secondary" style="width:45%;background:var(--sq-surface-neutral-subtler)!important;" title="Pendiente"></div>
</div>
<div class="d-flex gap-3 mt-1">
  <span style="font-size:11px;color:var(--sq-text-brand);">■ Completado 35%</span>
  <span style="font-size:11px;color:var(--sq-text-warning);">■ En progreso 20%</span>
  <span style="font-size:11px;color:var(--sq-text-subtlest);">■ Pendiente 45%</span>
</div>

<!-- ── Tarjeta de onboarding con steps ──────────────────────── -->
<div class="card" style="max-width:400px;">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span style="font-size:13px;font-weight:600;">Configuración de cuenta</span>
      <span style="font-size:12px;color:var(--sq-text-subtlest);">Paso 2 de 4</span>
    </div>
    <div class="progress mb-3"><div class="progress-bar" style="width:50%;"></div></div>
    <p style="font-size:13px;color:var(--sq-text-subtle);">
      Configura los permisos de tu equipo para continuar.
    </p>
    <button class="btn btn-primary btn-sm w-100">Continuar</button>
  </div>
</div>
