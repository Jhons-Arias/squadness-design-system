<!--
  SQUADNESS DS — Navbar / TopBar
  ───────────────────────────────────────────────────────────────
  Requiere: Bootstrap JS (para el toggler en móvil)
  Clases clave: .navbar  .navbar-expand-lg  .navbar-brand  .nav-link
  El borde inferior y bg vienen de squadness.css.
  Los colores de links y hover vienen de tokens.css via --bs-navbar-*.
-->

<!-- ── TopBar básico ─────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid">

    <!-- Logo / Marca -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="1" width="9" height="9" rx="2" fill="var(--sq-brand)" opacity="0.9"/>
        <rect x="12" y="1" width="9" height="9" rx="2" fill="var(--sq-brand)" opacity="0.55"/>
        <rect x="1" y="12" width="9" height="9" rx="2" fill="var(--sq-brand)" opacity="0.55"/>
        <rect x="12" y="12" width="9" height="9" rx="2" fill="var(--sq-brand)" opacity="0.25"/>
      </svg>
      MiApp
    </a>

    <!-- Toggler móvil -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#nav-main"
            aria-controls="nav-main" aria-expanded="false" aria-label="Menú">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links de navegación -->
    <div class="collapse navbar-collapse" id="nav-main">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item">
          <a class="nav-link active" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Usuarios</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Reportes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Configuración</a>
        </li>
      </ul>

      <!-- Zona derecha -->
      <div class="d-flex align-items-center gap-2">
        <!-- Búsqueda -->
        <div class="input-group input-group-sm" style="max-width:220px;">
          <input type="text" class="form-control" placeholder="Buscar..." />
        </div>

        <!-- Notificaciones -->
        <button class="btn btn-secondary btn-sm position-relative" aria-label="Notificaciones">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1a5 5 0 0 1 5 5v2.5l1 2H2l1-2V6a5 5 0 0 1 5-5Z"
                  stroke="currentColor" stroke-width="1.4" fill="none"/>
            <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span class="position-absolute top-0 start-100 translate-middle badge bg-danger"
                style="font-size:9px;padding:2px 5px;">3</span>
        </button>

        <!-- Avatar / menú usuario -->
        <div class="dropdown">
          <button class="btn btn-secondary btn-sm d-flex align-items-center gap-2 dropdown-toggle"
                  data-bs-toggle="dropdown" aria-expanded="false">
            <div style="width:24px;height:24px;border-radius:50%;
                        background:var(--sq-surface-brand-subtler);
                        display:flex;align-items:center;justify-content:center;
                        font-size:11px;font-weight:600;color:var(--sq-brand);">AM</div>
            Ana M.
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-header">ana@empresa.com</span></li>
            <li><a class="dropdown-item" href="#">Mi perfil</a></li>
            <li><a class="dropdown-item" href="#">Configuración</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" style="color:var(--sq-text-error);">Cerrar sesión</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ── TopBar minimalista (solo logo + usuario) ───────────────── -->
<nav class="navbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <strong style="color:var(--sq-brand);">Squadness</strong>
    </a>
    <div class="d-flex align-items-center gap-3">
      <span style="font-size:13px;color:var(--sq-text-subtlest);">Ana Martínez</span>
      <a href="#" style="font-size:13px;color:var(--sq-text-error);">Salir</a>
    </div>
  </div>
</nav>
